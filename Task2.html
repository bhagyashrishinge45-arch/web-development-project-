<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch Web Application</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
}

.container{
  background:#fff;
  padding:40px;
  border-radius:15px;
  text-align:center;
  width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
  margin-bottom:20px;
}

.time{
  font-size:40px;
  margin-bottom:25px;
}

.buttons button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
}

.start{ background:#28a745; color:#fff; }
.pause{ background:#ffc107; }
.reset{ background:#dc3545; color:#fff; }
.lap{ background:#007bff; color:#fff; }

.buttons button:hover{
  opacity:0.8;
}

ul{
  margin-top:20px;
  max-height:150px;
  overflow-y:auto;
  text-align:left;
}

ul li{
  padding:5px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">
  <h1>Stopwatch</h1>
  <div class="time" id="display">00:00:00</div>

  <div class="buttons">
    <button class="start" onclick="start()">Start</button>
    <button class="pause" onclick="pause()">Pause</button>
    <button class="reset" onclick="reset()">Reset</button>
    <button class="lap" onclick="lap()">Lap</button>
  </div>

  <ul id="laps"></ul>
</div>

<script>
let timer;
let seconds = 0;
let minutes = 0;
let hours = 0;
let running = false;

function updateDisplay(){
  let h = hours < 10 ? "0" + hours : hours;
  let m = minutes < 10 ? "0" + minutes : minutes;
  let s = seconds < 10 ? "0" + seconds : seconds;
  document.getElementById("display").innerText = h + ":" + m + ":" + s;
}

function start(){
  if(!running){
    running = true;
    timer = setInterval(()=>{
      seconds++;
      if(seconds == 60){
        seconds = 0;
        minutes++;
      }
      if(minutes == 60){
        minutes = 0;
        hours++;
      }
      updateDisplay();
    },1000);
  }
}

function pause(){
  running = false;
  clearInterval(timer);
}

function reset(){
  running = false;
  clearInterval(timer);
  seconds = 0;
  minutes = 0;
  hours = 0;
  updateDisplay();
  document.getElementById("laps").innerHTML = "";
}

function lap(){
  if(running){
    let lapTime = document.getElementById("display").innerText;
    let li = document.createElement("li");
    li.innerText = "Lap: " + lapTime;
    document.getElementById("laps").appendChild(li);
  }
}
</script>

</body>
</html>
